<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta
      name="description"
      content="Kaam Card hackathon prototype for computing an informal worker income profile and matching public schemes."
    >
    <title>Kaam Card</title>
    <link rel="icon" href="./favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="./styles.css">
    <style>
      .skip-link {
        position: absolute;
        top: -100%;
        left: 16px;
        z-index: 9999;
        padding: 12px 24px;
        background: var(--green);
        color: #fff;
        font-weight: 700;
        border-radius: 0 0 8px 8px;
        text-decoration: none;
        transition: top 200ms ease;
      }
      .skip-link:focus {
        top: 0;
      }
    </style>
  </head>
  <body>
    <a href="#app" class="skip-link">Skip to main content</a>
    <noscript>Kaam Card needs JavaScript to parse your CSV in this demo.</noscript>
    <div id="app" role="main" aria-label="Kaam Card Application"></div>
    <script src="./api.js"></script>
    <script src="./app.js"></script>
    <script src="./tests.js"></script>
  </body>
</html>
